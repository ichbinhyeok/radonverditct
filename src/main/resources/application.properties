gg.jte.developmentMode=${JTE_DEV_MODE:true}
gg.jte.templateLocation=src/main/jte

# In-memory H2 for debugging
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SQL_LOGGING:true}

# Security
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:CHANGE_ME_NOW}

# Feature Flags
app.feature.leads.enabled=${LEADS_ENABLED:false}
app.feature.waitlist.enabled=${WAITLIST_ENABLED:true}
