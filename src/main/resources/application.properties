gg.jte.developmentMode=${JTE_DEV_MODE:true}
gg.jte.templateLocation=src/main/jte

# In-memory H2 for debugging
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SQL_LOGGING:true}

# Security
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:tlsgur3108}

# Feature Flags
app.feature.leads.enabled=${LEADS_ENABLED:false}
app.feature.waitlist.enabled=${WAITLIST_ENABLED:true}
app.feature.monetization-hooks.enabled=${MONETIZATION_HOOKS_ENABLED:false}
app.feature.seo-debug-visible=${SEO_DEBUG_VISIBLE:false}

# Editorial trust defaults
app.content.author-name=${CONTENT_AUTHOR_NAME:RadonVerdict Editorial Team}
app.content.author-role=${CONTENT_AUTHOR_ROLE:Data and Content Team}
app.content.reviewer-name=${CONTENT_REVIEWER_NAME:}
app.content.reviewer-role=${CONTENT_REVIEWER_ROLE:Independent Reviewer}
app.content.last-reviewed=${CONTENT_LAST_REVIEWED:}
app.content.privacy-last-updated=${CONTENT_PRIVACY_LAST_UPDATED:February 1, 2026}

# Site metadata (used by sitemap/robots)
app.site.base-url=${SITE_BASE_URL:https://radonverdict.com}
app.site.lastmod=${SITE_LASTMOD:}
app.site.enforce-canonical-host=${SITE_ENFORCE_CANONICAL_HOST:true}
app.site.include-unknown-sitemap=${SITE_INCLUDE_UNKNOWN_SITEMAP:false}
app.site.index-zone3-pages=${SITE_INDEX_ZONE3_PAGES:false}

# Lightweight local persistence paths (mount these on production for durability)
app.storage.leads-csv-path=${LEADS_CSV_PATH:data/leads.csv}
app.storage.telemetry-csv-path=${TELEMETRY_CSV_PATH:data/telemetry_events.csv}
app.storage.contact-csv-path=${CONTACT_CSV_PATH:data/contact_messages.csv}

# Respect reverse-proxy headers (Cloudflare / load balancer)
server.forward-headers-strategy=framework
