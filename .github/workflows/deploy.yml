name: Build & Deploy to OCI (ARM64)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_REPO: "shinhyeok22/radonverdict"
  IMAGE_TAG: "latest"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      # 1. x86(표준 러너) 환경에서 극한의 속도로 Java 앱(빌드) 우선 처리 (QEMU 회피 목적)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run SEO and persuasion quality gates
        env:
          JTE_DEV_MODE: "false"
        run: |
          ./gradlew --no-daemon --max-workers=1 test \
            --tests "com.radonverdict.SeoBehaviorIntegrationTest" \
            --tests "com.radonverdict.ContentDepthAuditTest" \
            --tests "com.radonverdict.PersuasionQualityAuditTest"
        
      - name: Build with Gradle (Skipping Tests for Speed)
        run: ./gradlew clean build -x test

      # 2. 빌드된 산출물(Jar)을 가지고 도커 빌드 준비 (linux/arm64 지원 셋업)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      # 3. Docker 이미지 빌드 및 푸시 (linux/arm64)
      - name: Build and push ARM64 Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKERHUB_REPO }}:${{ env.IMAGE_TAG }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    
    steps:
      - name: SSH to OCI and Deploy via Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            # 배포 디렉토리 생성 및 이동
            mkdir -p ~/deploy/radonverdict
            mkdir -p ~/deploy/radonverdict/data
            cd ~/deploy/radonverdict
            
            if docker ps -a --format '{{.Names}}' | grep -q '^radonverdict$'; then
              if [ -z "$(ls -A ~/deploy/radonverdict/data 2>/dev/null)" ]; then
                docker cp radonverdict:/app/data/. ~/deploy/radonverdict/data/ 2>/dev/null || true
              fi
            fi
            chmod -R 0777 ~/deploy/radonverdict/data
            
            # docker-compose.yml 동적 생성 (하드코딩하지 않고 CI에서 바로 주입)
            cat << 'EOF' > docker-compose.yml
            services:
              radonverdict-app:
                image: shinhyeok22/radonverdict:latest
                container_name: radonverdict
                restart: unless-stopped
                ports:
                  - "8807:8080"
                volumes:
                  - ./data:/app/data
                environment:
                  - GG_JTE_DEVELOPMENTMODE=false
                  - GG_JTE_USEPRECOMPILEDTEMPLATES=true
                  - SPRING_PROFILES_ACTIVE=prod
                  - LEADS_CSV_PATH=/app/data/leads.csv
                  - TELEMETRY_CSV_PATH=/app/data/telemetry_events.csv
                  - CONTACT_CSV_PATH=/app/data/contact_messages.csv
                deploy:
                  resources:
                    limits:
                      memory: 512M
            EOF
            
            # 최신 형상 병합을 위한 pull (V2 명령어 사용)
            docker compose pull
            
            # 컨테이너 무중단(이전 컨테이너 중지 후) 기동
            docker compose up -d
            
            # 불필요한/오래된 찌꺼기 이미지 및 빌드 캐시 청소 (용량 최적화)
            docker image prune -af
